# Example configuration for corporate proxy environment
execution=local
browser=chrome
baseUrl=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# GitHub access configuration for corporate proxy
github.hostname=github.com
github.api.hostname=api.github.com
github.releases.hostname=github.com
# Enable proxy for corporate environment
github.proxy.enabled=true
github.proxy.host=corporate.proxy.com
github.proxy.port=8080
# Standard GitHub endpoints
github.api.url=https://api.github.com
github.releases.url=https://github.com