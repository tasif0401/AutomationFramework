# Example configuration for GitHub Enterprise Server
execution=local
browser=chrome
baseUrl=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# GitHub access configuration for Enterprise GitHub
github.hostname=github.enterprise.com
github.api.hostname=github.enterprise.com/api/v3
github.releases.hostname=github.enterprise.com
# No proxy needed for internal enterprise GitHub
github.proxy.enabled=false
github.proxy.host=
github.proxy.port=
# Custom GitHub Enterprise endpoints
github.api.url=https://github.enterprise.com/api/v3
github.releases.url=https://github.enterprise.com