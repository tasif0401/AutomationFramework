
name: Matrix CI - Web & Mobile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [web-chrome-local, web-firefox-local, web-chrome-lambdatest, android-lambdatest, ios-lambdatest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      - name: Install dependencies
        run: mvn -B -DskipTests=false test -DskipITs
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
